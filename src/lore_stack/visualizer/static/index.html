<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>lore-stack visualizer</title>
<style>
  :root { --bg:#14161c; --panel:#1d2027; --line:#2c313c; --fg:#d8dce6; --dim:#8b93a5;
          --canon:#5fb878; --soft:#c9a93f; --motif:#b06fd4; --dep:#5b6172; --bad:#d46a6a; }
  * { box-sizing: border-box; }
  body { margin:0; font:13px/1.45 system-ui, sans-serif; background:var(--bg); color:var(--fg);
         display:grid; grid-template-columns: 1fr minmax(280px, 30%); grid-template-rows: 44px 1fr; height:100vh; }
  header { grid-column:1/3; display:flex; align-items:center; gap:12px; padding:0 14px;
           border-bottom:1px solid var(--line); }
  header h1 { font-size:14px; margin:0 12px 0 0; color:var(--fg); }
  header input { flex:1; max-width:480px; background:var(--panel); color:var(--fg);
                 border:1px solid var(--line); border-radius:4px; padding:6px 8px; }
  header button, .panel button { background:#2a3140; color:var(--fg); border:1px solid var(--line);
                 border-radius:4px; padding:6px 10px; cursor:pointer; }
  header button:hover, .panel button:hover { background:#39435a; }
  #graph { position:relative; overflow:hidden; }
  svg { width:100%; height:100%; display:block; cursor:grab; }
  svg.panning { cursor:grabbing; }
  #graphControls { position:absolute; top:8px; left:8px; display:flex; gap:6px; z-index:2; }
  #graphControls button { background:var(--panel); color:var(--fg); border:1px solid var(--line);
                          border-radius:4px; padding:3px 8px; cursor:pointer; font-size:12px; }
  #graphControls button:hover { background:#39435a; }
  #graphHint { position:absolute; bottom:8px; left:8px; color:var(--dim); font-size:11px;
               pointer-events:none; }
  aside { border-left:1px solid var(--line); overflow-y:auto; overflow-x:hidden; padding:12px;
          min-width:0; overflow-wrap:anywhere; }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:6px;
           padding:10px 12px; margin-bottom:12px; }
  .panel h2 { font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--dim);
              margin:0 0 8px; }
  .fact { padding:4px 0; border-bottom:1px dashed var(--line); display:flex; gap:6px;
          align-items:baseline; flex-wrap:wrap; }
  .fact:last-child { border-bottom:none; }
  .badge { font-size:10px; padding:1px 6px; border-radius:8px; color:#10131a; font-weight:600; }
  .badge.canonical { background:var(--canon); } .badge.soft { background:var(--soft); }
  .badge.motif { background:var(--motif); } .badge.deprecated { background:var(--dep); color:#cfd3dd; }
  .dim { color:var(--dim); } .small { font-size:11px; }
  pre { white-space:pre-wrap; background:#10131a; padding:8px; border-radius:4px;
        max-height:300px; overflow-y:auto; font-size:12px; }
  .node-label { fill:var(--fg); font-size:11px; pointer-events:none; }
  .edge-label { fill:var(--dim); font-size:9px; pointer-events:none; }
  line.edge { stroke:#3a4150; stroke-width:1.2; }
  .editrow { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .editrow input { flex:1 1 90px; min-width:0; background:#10131a; color:var(--fg);
                   border:1px solid var(--line); border-radius:4px; padding:4px 6px; }
  .editrow button { flex:0 1 auto; }
  .danger { color:var(--bad); }
  details summary { cursor:pointer; color:var(--dim); }
</style>
</head>
<body>
<header>
  <h1>lore-stack</h1>
  <select id="loreSel" style="display:none; background:var(--panel); color:var(--fg);
          border:1px solid var(--line); border-radius:4px; padding:6px 8px;"></select>
  <button id="newLoreBtn" style="display:none">+ lore</button>
  <button id="copyLoreBtn" style="display:none">copy lore</button>
  <input id="query" placeholder='Query, e.g. "Tell another story with Boxwell"'>
  <button id="compileBtn">Compile context</button>
  <button id="exportBtn">Export JSON</button>
</header>
<div id="graph">
  <div id="graphControls">
    <button id="homeBtn" title="Deselect any node and return to the home view">&#8962; home</button>
    <button id="zoomIn" title="Zoom in">+</button>
    <button id="zoomOut" title="Zoom out">&minus;</button>
    <button id="resetView" title="Reset view">reset view</button>
  </div>
  <svg id="svg"></svg>
  <div id="graphHint">drag to pan &middot; scroll to zoom</div>
</div>
<aside>
  <div class="panel" id="inbox" style="display:none"><h2>Review inbox</h2></div>
  <div class="panel" id="detail"><h2>Home</h2><div class="dim">No node selected. Click a node in the graph to inspect it, or use the panels below.</div></div>
  <div class="panel" id="context" style="display:none"><h2>Compiled context preview</h2></div>
  <div class="panel" id="retrieval" style="display:none"><h2>Retrieval inspector</h2></div>
  <div class="panel" id="conflicts"><h2>Open conflicts</h2><div class="dim">none</div></div>
  <div class="panel" id="motifs"><h2>Motifs (never canon)</h2><div class="dim">none</div></div>
  <div class="panel" id="history"><h2>History</h2><div class="dim">none</div></div>
</aside>
<script>
let HOME_MODE = false, LORE = null;
const withLore = p => (!HOME_MODE || !LORE) ? p
  : p + (p.includes("?") ? "&" : "?") + "lore=" + encodeURIComponent(LORE);
const api = p => fetch(withLore(p)).then(r => r.json());
const post = (p, body) => fetch(withLore(p), {method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(body||{})}).then(async r => {
  const j = await r.json(); if (!r.ok) throw new Error(j.error || r.statusText); return j; });

async function initLores(){
  const r = await fetch("/api/lores");
  if (!r.ok) return;  // single-database mode: no switcher
  HOME_MODE = true;
  const sel = document.getElementById("loreSel");
  const btn = document.getElementById("newLoreBtn");
  const copyBtn = document.getElementById("copyLoreBtn");
  sel.style.display = ""; btn.style.display = ""; copyBtn.style.display = "";
  const lores = await r.json();
  const names = lores.map(l => l.name);
  sel.innerHTML = lores.map(l =>
    `<option value="${l.name}">${l.name} (${l.entities} entities` +
    (l.open_conflicts ? `, ${l.open_conflicts} conflicts` : "") + `)</option>`).join("");
  const saved = localStorage.getItem("lore");
  LORE = names.includes(saved) ? saved : names[0] || null;
  if (LORE) sel.value = LORE;
  sel.onchange = () => { LORE = sel.value; localStorage.setItem("lore", LORE); loadGraph(); };
  async function makeLore(body, errLabel){
    try {
      await fetch("/api/lores", {method:"POST", headers:{"Content-Type":"application/json"},
                                 body: JSON.stringify(body)})
        .then(async r => { const j = await r.json(); if (!r.ok) throw new Error(j.error); });
      localStorage.setItem("lore", body.name);
      await initLores(); loadGraph();
    } catch (e){ alert(errLabel + ": " + e.message); }
  }
  btn.onclick = () => {
    const name = prompt("New (empty) lore name (letters, digits, - and _):");
    if (name) makeLore({name}, "Could not create lore");
  };
  copyBtn.onclick = () => {
    if (!LORE) return;
    const name = prompt(`Copy "${LORE}" to a new lore named:`, LORE + "-copy");
    if (name) makeLore({name, copy_from: LORE}, "Could not copy lore");
  };
}
const KIND_COLOR = {character:"#6f9ceb", location:"#5fb878", item:"#c9a93f",
                    organization:"#d4836f", event:"#b06fd4", concept:"#7fc7c7"};
let G = {entities:[], edges:[]}, sim = null;

function esc(s){ const d=document.createElement("div"); d.textContent=String(s??""); return d.innerHTML; }

async function loadGraph(){
  if (HOME_MODE && !LORE) {
    document.getElementById("detail").innerHTML =
      '<h2>Entity</h2><div class="dim">No lores yet — click "+ lore" to create one.</div>';
    return;
  }
  G = await api("/api/graph");
  drawGraph();
  loadPanels();
}

const NS_SVG = "http://www.w3.org/2000/svg";
let view = {tx: 0, ty: 0, scale: 1};
let viewport = null;

function applyView(){
  if (viewport) viewport.setAttribute("transform",
    `translate(${view.tx} ${view.ty}) scale(${view.scale})`);
}
function resetView(){ view = {tx: 0, ty: 0, scale: 1}; applyView(); }

function setupPanZoom(){
  const svg = document.getElementById("svg");
  let panning = false, moved = false, sx = 0, sy = 0;
  svg.addEventListener("mousedown", e => {
    panning = true; moved = false; sx = e.clientX; sy = e.clientY;
    svg.classList.add("panning");
  });
  window.addEventListener("mousemove", e => {
    if (!panning) return;
    const dx = e.clientX - sx, dy = e.clientY - sy;
    if (Math.abs(dx) + Math.abs(dy) > 3) moved = true;
    view.tx += dx; view.ty += dy; sx = e.clientX; sy = e.clientY; applyView();
  });
  window.addEventListener("mouseup", () => { panning = false; svg.classList.remove("panning"); });
  // Suppress the node click that would otherwise fire at the end of a drag.
  svg.addEventListener("click", e => { if (moved) { e.stopPropagation(); moved = false; } }, true);
  // A plain click on empty graph background (not a node, not a drag) deselects.
  svg.addEventListener("click", e => {
    if (e.target === svg || e.target.id === "viewport") exitToHome();
  });
  svg.addEventListener("wheel", e => {
    e.preventDefault();
    const rect = svg.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? 1.15 : 1/1.15;
    const ns = Math.max(0.2, Math.min(5, view.scale * factor));
    const k = ns / view.scale;
    // Keep the point under the cursor fixed while zooming.
    view.tx = mx - (mx - view.tx) * k;
    view.ty = my - (my - view.ty) * k;
    view.scale = ns; applyView();
  }, {passive: false});
  document.getElementById("homeBtn").onclick = exitToHome;
  document.getElementById("zoomIn").onclick = () => zoomBy(1.25);
  document.getElementById("zoomOut").onclick = () => zoomBy(1/1.25);
  document.getElementById("resetView").onclick = resetView;
}
function zoomBy(factor){
  const svg = document.getElementById("svg");
  const cx = svg.clientWidth/2, cy = svg.clientHeight/2;
  const ns = Math.max(0.2, Math.min(5, view.scale * factor));
  const k = ns / view.scale;
  view.tx = cx - (cx - view.tx) * k; view.ty = cy - (cy - view.ty) * k;
  view.scale = ns; applyView();
}

function drawGraph(){
  const svg = document.getElementById("svg");
  const W = svg.clientWidth || 800, H = svg.clientHeight || 600;
  svg.innerHTML = "";
  viewport = document.createElementNS(NS_SVG, "g");
  viewport.setAttribute("id", "viewport");
  svg.appendChild(viewport);
  applyView();
  const nodes = G.entities.map((e,i) => ({...e,
    x: W/2 + Math.cos(2*Math.PI*i/Math.max(G.entities.length,1)) * Math.min(W,H)/3.2,
    y: H/2 + Math.sin(2*Math.PI*i/Math.max(G.entities.length,1)) * Math.min(W,H)/3.2,
    vx:0, vy:0}));
  const byId = Object.fromEntries(nodes.map(n => [n.entity_id, n]));
  const edges = G.edges.filter(e => byId[e.subject_entity_id] && byId[e.object_entity_id]);

  // tiny deterministic force layout: a few hundred fixed iterations
  for (let it=0; it<300; it++){
    for (const e of edges){
      const a=byId[e.subject_entity_id], b=byId[e.object_entity_id];
      const dx=b.x-a.x, dy=b.y-a.y, d=Math.hypot(dx,dy)||1, f=(d-140)*0.01;
      a.vx+=f*dx/d; a.vy+=f*dy/d; b.vx-=f*dx/d; b.vy-=f*dy/d;
    }
    for (const a of nodes) for (const b of nodes){
      if (a===b) continue;
      const dx=b.x-a.x, dy=b.y-a.y, d2=dx*dx+dy*dy||1;
      const f=Math.min(2000/d2, 4); a.vx-=f*dx/Math.sqrt(d2); a.vy-=f*dy/Math.sqrt(d2);
    }
    for (const n of nodes){
      n.vx += (W/2-n.x)*0.002; n.vy += (H/2-n.y)*0.002;
      n.x += n.vx*0.5; n.y += n.vy*0.5; n.vx*=0.6; n.vy*=0.6;
      n.x = Math.max(30, Math.min(W-30, n.x)); n.y = Math.max(30, Math.min(H-30, n.y));
    }
  }
  const NS = NS_SVG;
  for (const e of edges){
    const a=byId[e.subject_entity_id], b=byId[e.object_entity_id];
    const line = document.createElementNS(NS,"line");
    line.setAttribute("class","edge");
    line.setAttribute("x1",a.x); line.setAttribute("y1",a.y);
    line.setAttribute("x2",b.x); line.setAttribute("y2",b.y);
    viewport.appendChild(line);
    const t = document.createElementNS(NS,"text");
    t.setAttribute("class","edge-label");
    t.setAttribute("x",(a.x+b.x)/2); t.setAttribute("y",(a.y+b.y)/2 - 4);
    t.setAttribute("text-anchor","middle");
    t.textContent = e.predicate + (e.status==="soft" ? " (soft)" : "");
    viewport.appendChild(t);
  }
  for (const n of nodes){
    const g = document.createElementNS(NS,"g");
    g.style.cursor = "pointer";
    g.addEventListener("click", () => showEntity(n.entity_id));
    const c = document.createElementNS(NS,"circle");
    c.setAttribute("cx",n.x); c.setAttribute("cy",n.y);
    c.setAttribute("r", n.status==="canonical" ? 14 : 11);
    c.setAttribute("fill", KIND_COLOR[n.kind] || "#888");
    c.setAttribute("stroke", n.status==="canonical" ? "#fff" : "#555");
    c.setAttribute("stroke-width", n.status==="canonical" ? 2 : 1);
    if (n.status==="provisional") c.setAttribute("stroke-dasharray","3,2");
    g.appendChild(c);
    const t = document.createElementNS(NS,"text");
    t.setAttribute("class","node-label");
    t.setAttribute("x",n.x); t.setAttribute("y",n.y+26); t.setAttribute("text-anchor","middle");
    t.textContent = n.display_name;
    g.appendChild(t);
    viewport.appendChild(g);
  }
}

function factRow(f, withActions){
  const obj = f.object_literal ?? f.object_entity_id ?? "";
  const prov = f.provenance
    ? (f.provenance.kind === "manual"
       ? `manual edit (${f.provenance.source_id})`
       : `${f.provenance.story_title ?? f.provenance.story_id} — “${f.provenance.evidence_excerpt ?? ""}” (conf ${f.provenance.claim_confidence})`)
    : "";
  return `<div class="fact">
    <span class="badge ${esc(f.status)}">${esc(f.status)}</span>
    <b>${esc(f.predicate)}</b><span>= ${esc(obj)}</span>
    ${withActions && f.status!=="deprecated" ? `<button class="small danger" onclick="dropFact('${esc(f.fact_id)}')">delete</button>` : ""}
    <div class="small dim" style="flex-basis:100%">${esc(prov)}</div>
  </div>`;
}

const HOME_DETAIL = '<h2>Home</h2><div class="dim">No node selected. Click a node'
  + ' in the graph to inspect it, or use the panels below — open conflicts, motifs,'
  + ' review inbox, and history.</div>';

function exitToHome(){
  // If a snapshot preview is showing, return to the live graph first.
  if (typeof previewingSeq !== "undefined" && previewingSeq !== null) exitPreview();
  document.getElementById("detail").innerHTML = HOME_DETAIL;
}

async function showEntity(entityId){
  const facts = await api("/api/facts?entity=" + encodeURIComponent(entityId));
  const ent = G.entities.find(e => e.entity_id === entityId) || {display_name: entityId};
  const active = facts.filter(f => f.status !== "deprecated");
  const history = facts.filter(f => f.status === "deprecated");
  document.getElementById("detail").innerHTML = `
    <h2>Entity <button class="small" style="float:right" onclick="exitToHome()">&#8962; home</button></h2>
    <div><b>${esc(ent.display_name)}</b> <span class="dim">(${esc(ent.kind||"")}, ${esc(ent.status||"")})</span></div>
    <div class="small dim">${esc(ent.summary||"")}</div>
    <div class="small dim">aliases: ${esc((ent.aliases||[]).join(", "))}</div>
    <div style="margin-top:8px">${active.map(f => factRow(f, true)).join("") || '<span class="dim">no facts</span>'}</div>
    ${history.length ? `<details><summary>${history.length} deprecated (history)</summary>${history.map(f => factRow(f,false)).join("")}</details>` : ""}
    <div class="editrow">
      <input id="ep" placeholder="predicate">
      <input id="ev" placeholder="value">
      <button onclick="editFact('${esc(entityId)}')">save (canonical)</button>
    </div>
    <div class="small dim">Operator edits are authoritative: written as canonical with a manual
    source, bypassing adjudication. Prior values are kept as deprecated history.</div>
    <div class="editrow"><button class="danger" onclick="dropEntity('${esc(entityId)}')">delete entity (soft)</button></div>`;
}

async function editFact(entityId){
  const predicate = document.getElementById("ep").value.trim();
  const value = document.getElementById("ev").value;
  try {
    await post(`/api/entity/${encodeURIComponent(entityId)}/edit`, {predicate, value});
    await loadGraph(); await showEntity(entityId);
  } catch (e){ alert("Edit rejected: " + e.message); }
}
async function dropFact(factId){
  try { await post(`/api/fact/${encodeURIComponent(factId)}/deprecate`); await loadGraph(); }
  catch (e){ alert(e.message); }
}
async function dropEntity(entityId){
  if (!confirm("Soft-delete this entity? History is preserved and recoverable.")) return;
  try { await post(`/api/entity/${encodeURIComponent(entityId)}/deprecate`); await loadGraph(); }
  catch (e){ alert(e.message); }
}

async function loadInbox(){
  const inbox = await api("/api/staged");
  const panel = document.getElementById("inbox");
  if (!inbox.length){ panel.style.display = "none"; return; }
  panel.style.display = "";
  panel.innerHTML = "<h2>Review inbox</h2>" +
    '<div class="small dim">Proposed lore awaiting your approval. Nothing here has been written yet.</div>' +
    inbox.map(s => `<div class="fact" style="flex-direction:column; align-items:flex-start">
      <div><b>${esc(s.story_title || s.story_id || s.staging_id)}</b>
        <span class="dim small">${s.counts.entities}ent ${s.counts.claims}cl ${s.counts.chunks}ch</span></div>
      <button class="small" onclick="reviewStage('${esc(s.staging_id)}')">review &amp; apply</button>
    </div>`).join("");
}

async function reviewStage(sid){
  const s = await api("/api/staged/" + encodeURIComponent(sid));
  const d = s.delta;
  const section = (key, items, render) => !items.length ? "" :
    `<div style="margin-top:8px"><b class="small">${key} (${items.length})</b>` +
    items.map((it, i) => `<label class="fact small" style="gap:6px">
      <input type="checkbox" checked data-key="${key}" data-i="${i}"> ${render(it)}</label>`).join("") + "</div>";
  // Claims sorted by confidence (advisory) but checkbox index must map to the
  // original delta order, so we annotate each with its true index.
  const claimItems = d.claims.map((c, i) => ({c, i}))
    .sort((a, b) => (b.c.confidence||0) - (a.c.confidence||0));
  document.getElementById("detail").innerHTML = `
    <h2>Review: ${esc(d.story_title || sid)}</h2>
    <div class="small dim">Uncheck anything you don't want. Confidence is advisory only.</div>
    ${section("entities", d.entities, e => `${esc(e.display_name)} <span class="dim">(${esc(e.kind)})</span>`)}
    <div style="margin-top:8px"><b class="small">claims (${d.claims.length})</b>` +
    claimItems.map(({c, i}) => `<label class="fact small" style="gap:6px">
      <input type="checkbox" checked data-key="claims" data-i="${i}">
      ${esc(c.subject_slug)} <b>${esc(c.predicate)}</b> ${esc(c.object_slug || c.object_literal || "")}
      <span class="dim">${(c.confidence!=null)?c.confidence.toFixed(2):""}</span></label>`).join("") + `</div>
    ${section("chunks", d.chunks, c => `${esc(c.title)} <span class="dim">[${esc(c.insertion_lane)}]</span>`)}
    <div class="editrow">
      <button onclick="applyStage('${esc(sid)}')">apply selected</button>
      <button class="danger" onclick="discardStage('${esc(sid)}')">discard</button>
    </div>`;
}

function collectSelection(){
  const sel = {entities: [], claims: [], chunks: [], open_questions: []};
  document.querySelectorAll("#detail input[type=checkbox]").forEach(cb => {
    if (cb.checked) sel[cb.dataset.key].push(parseInt(cb.dataset.i, 10));
  });
  return sel;
}
async function applyStage(sid){
  try {
    await post(`/api/staged/${encodeURIComponent(sid)}/apply`, {selection: collectSelection()});
    await loadGraph();
    document.getElementById("detail").innerHTML = '<h2>Entity</h2><div class="dim">Applied. Click a node.</div>';
  } catch (e){ alert("Apply failed: " + e.message); }
}
async function discardStage(sid){
  if (!confirm("Discard this proposal? Nothing was written, so this just clears it.")) return;
  try { await post(`/api/staged/${encodeURIComponent(sid)}/discard`); await loadGraph();
        document.getElementById("detail").innerHTML = '<h2>Entity</h2><div class="dim">Discarded. Click a node.</div>'; }
  catch (e){ alert(e.message); }
}

async function loadPanels(){
  await loadInbox();
  const conflicts = await api("/api/conflicts");
  const contradictions = conflicts.filter(c => c.payload.kind !== "merge_suggestion");
  const merges = conflicts.filter(c => c.payload.kind === "merge_suggestion");
  document.getElementById("conflicts").innerHTML = "<h2>Open conflicts</h2>" +
    '<div class="small dim">A new story contradicted established canon. Keep what canon already holds, or accept the new value (which deprecates the old).</div>' +
    (contradictions.length ? contradictions.map(c => {
      const proposed = c.payload.proposed_object_literal ?? c.payload.proposed_object_entity_id ?? "?";
      const existing = c.payload.existing_object_literal ?? c.payload.existing_object_entity_id ?? "?";
      return `<div class="fact" style="flex-direction:column; align-items:flex-start">
        <div class="small"><b>${esc(c.payload.predicate)}</b>:
          canon says <b>${esc(existing)}</b>, a story proposed <b>${esc(proposed)}</b></div>
        <div style="margin-top:4px">
          <button class="small" onclick="resolveConflict('${esc(c.item_id)}','keep_existing')">keep "${esc(existing)}"</button>
          <button class="small" onclick="resolveConflict('${esc(c.item_id)}','accept_proposed')">use "${esc(proposed)}"</button>
        </div>
      </div>`;
    }).join("") : '<div class="dim">none</div>') +
    "<h2 style='margin-top:10px'>Merge suggestions</h2>" +
    '<div class="small dim">Possible duplicate values. Pick the one to keep; the other becomes history.</div>' +
    (merges.length ? merges.map(c => `
      <div class="fact" style="flex-direction:column; align-items:flex-start">
        <div class="small dim">${esc(c.payload.predicate)} (cosine ${c.payload.cosine})</div>
        <button class="small" onclick="resolveMerge('${esc(c.item_id)}','${esc(c.payload.fact_a)}')">keep "${esc(c.payload.fact_a_text)}"</button>
        <button class="small" onclick="resolveMerge('${esc(c.item_id)}','${esc(c.payload.fact_b)}')">keep "${esc(c.payload.fact_b_text)}"</button>
      </div>`).join("") : '<div class="dim">none</div>');
  const motifs = await api("/api/motifs");
  document.getElementById("motifs").innerHTML = "<h2>Motifs (never canon)</h2>" +
    (motifs.length ? motifs.map(f => factRow(f,false)).join("") : '<div class="dim">none</div>');

  const snaps = await api("/api/snapshots");
  document.getElementById("history").innerHTML = "<h2>History</h2>" +
    '<div class="small dim">Each entry is the state just before an operation. Click "preview" to inspect a snapshot in the graph before rolling back; rolling back is itself undoable.</div>' +
    (snaps.length ? snaps.map(s => {
      const c = s.counts;
      return `<div class="fact">
        <span class="small">before <b>${esc(s.operation)}</b>
          <span class="dim">(${c.stories}st ${c.entities}ent ${c.facts}fct${c.open_conflicts ? ", " + c.open_conflicts + "cf" : ""})</span></span>
        <button class="small" onclick="previewSnapshot(${s.seq}, '${esc(s.operation)}')">preview</button>
      </div>`;
    }).join("") : '<div class="dim">no snapshots yet</div>');
}

let previewingSeq = null;

async function previewSnapshot(seq, operation){
  try {
    G = await api(`/api/snapshots/${seq}/preview`);
  } catch (e){ alert("Preview failed: " + e.message); return; }
  previewingSeq = seq;
  drawGraph();
  // A banner over the graph: this is a read-only past state, with the actions.
  let banner = document.getElementById("previewBanner");
  if (!banner){
    banner = document.createElement("div");
    banner.id = "previewBanner";
    banner.style.cssText = "position:absolute; top:8px; right:8px; z-index:3; background:var(--panel);"
      + " border:1px solid var(--soft); border-radius:6px; padding:8px 10px; max-width:280px;";
    document.getElementById("graph").appendChild(banner);
  }
  banner.innerHTML = `<div class="small"><b>Previewing snapshot ${String(seq).padStart(6,'0')}</b>`
    + ` <span class="dim">(state before ${esc(operation)})</span></div>`
    + '<div class="small dim" style="margin:4px 0">Read-only — this is not the current lore.</div>'
    + `<button class="small" onclick="rollback(${seq})">roll back to this</button> `
    + '<button class="small" onclick="exitPreview()">back to current</button>';
}

function clearPreview(){
  previewingSeq = null;
  const b = document.getElementById("previewBanner");
  if (b) b.remove();
}
function exitPreview(){ clearPreview(); loadGraph(); }

async function resolveMerge(itemId, keepFactId){
  try { await post(`/api/merge/${encodeURIComponent(itemId)}/resolve`, {keep: keepFactId});
        await loadGraph(); }
  catch (e){ alert("Merge failed: " + e.message); }
}

async function resolveConflict(itemId, decision){
  try { await post(`/api/conflicts/${encodeURIComponent(itemId)}/resolve`, {decision});
        await loadGraph(); }
  catch (e){ alert("Resolve failed: " + e.message); }
}

async function rollback(seq){
  if (!confirm("Roll the lore back to this point? The current state is snapshotted first, so this is reversible.")) return;
  try {
    await post(`/api/snapshots/${seq}/rollback`);
    clearPreview();
    await loadGraph();
  }
  catch (e){ alert("Rollback failed: " + e.message); }
}

document.getElementById("compileBtn").addEventListener("click", async () => {
  const query = document.getElementById("query").value.trim();
  if (!query) return;
  const [ctx, cands] = [await post("/api/query_context", {query}),
                        await api("/api/retrieval?q=" + encodeURIComponent(query))];
  const ctxPanel = document.getElementById("context");
  ctxPanel.style.display = "";
  ctxPanel.innerHTML = `<h2>Compiled context preview</h2>
    <div class="small dim">${ctx.total_tokens}/${ctx.budget_tokens} tokens — each piece traced below</div>
    <pre>${esc(ctx.text)}</pre>
    ${ctx.selected.map(s => `<div class="small">✔ <b>${esc(s.lane)}</b> ${esc(s.title)}
      <span class="dim">${esc(s.chunk_id)} score ${s.score} [${esc(s.reasons.join(", "))}]</span></div>`).join("")}
    ${ctx.dropped.map(d => `<div class="small dim">✘ ${esc(d.title)} (${esc(d.disposition)})</div>`).join("")}`;
  const rPanel = document.getElementById("retrieval");
  rPanel.style.display = "";
  rPanel.innerHTML = "<h2>Retrieval inspector</h2>" + cands.map(c =>
    `<div class="small"><b>${c.score}</b> ${esc(c.title)}
     <span class="dim">${esc(c.lane)} [${esc(c.reasons.join(", "))}]</span></div>`).join("");
});

document.getElementById("exportBtn").addEventListener("click", async () => {
  const data = await api("/api/export");
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "lore-export.json"; a.click();
});

setupPanZoom();
initLores().then(loadGraph);
</script>
</body>
</html>
