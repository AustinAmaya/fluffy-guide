name: deterministic gate

# The deterministic gate is lore-stack's safety promise: `pytest -m "not model"`
# must be green and byte-for-byte repeatable. This runs it on every push and PR.
# Live-model tests (marker `model`) need API keys and are excluded here.

on:
  push:
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install (with dev extras)
        run: python -m pip install -e ".[dev]"

      - name: Run the deterministic gate
        run: python -m pytest -m "not model"
